name: Build Desktop Pet Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "desktop-pet-studio/**"
      - ".github/workflows/desktop-pet-build.yml"

jobs:
  windows:
    name: Windows EXE
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-pet-studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop-pet-studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-windows-exe
          path: |
            desktop-pet-studio/release/*.exe
            desktop-pet-studio/release/*.blockmap

  macos:
    name: macOS DMG
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop-pet-studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop-pet-studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run dist:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-macos-dmg
          path: |
            desktop-pet-studio/release/*.dmg
            desktop-pet-studio/release/*.blockmap
